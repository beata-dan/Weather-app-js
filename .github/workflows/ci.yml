name: Weather Pipeline CI/CD (JS) #Name of key with a corresponding value for GitHub to display

on:
  push:
  schedule:
    - cron: '0 */2 * * *' # is an instruction to tell how many times to do something and when, can look at cron calculator to know when
  workflow_dispatch: # The above means "I want you to run this at 0 mins past the hour every 2 hrs"

permissions:
  contents: write

jobs: # Essentially GitHub is creating a mini computer for these to run 
  test_and_fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Use Node.JS
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Cache Node modules
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        run: npm ci # Install exactly the version we have noted in package-lock.json to make it more faster and reliable, this is a version lock
      - name: Fetch latest Weather
        env:
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
          WEATHER_CITY: ${{ secrets.CITY }}
        run: node fetchWeather.js
      - name: Commit weather data if changed # Automates this whole process
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/weather.json data/weather_log.csv || true
          git commit -m "ci: update weather data" || echo "No changes to commit"
          git push || echo "Push failed or no changes"
      - name: Trigger Render Deploy
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
